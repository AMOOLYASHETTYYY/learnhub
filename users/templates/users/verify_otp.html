{% extends 'base.html' %}

{% block content %}
<h2>Verify OTP</h2>

<form method="post">
    {% csrf_token %}
    
    <div class="mb-3">
        <label for="otp" class="form-label">Enter the OTP sent to your email:</label>
        <input type="text" name="otp" id="otp" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">Verify</button>
</form>
{% endblock %}
