{% extends 'base.html' %}
{% block content %}
  <h3>Your Courses</h3>
  <a href="{% url 'create_course' %}" class="btn btn-success mb-3">+ Create New Course</a>

  <div class="row">
    {% for course in courses %}
      <div class="col-md-4">
        <div class="card mb-3 shadow-sm">
          <div class="card-body">
            <h5 class="card-title">{{ course.title }}</h5>
            <p class="card-text">{{ course.description }}</p>
            <a href="{% url 'edit_course' course.id %}" class="btn btn-outline-primary btn-sm">Edit</a>
            <a href="{% url 'delete_course' course.id %}" class="btn btn-outline-danger btn-sm">Delete</a>
            <a href="{% url 'view_enrollments' course.id %}" class="btn btn-outline-info btn-sm">View Students</a>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
{% endblock %}
