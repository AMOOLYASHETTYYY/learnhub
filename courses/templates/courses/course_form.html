{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">{{ form.instance.id|yesno:"Edit,Create" }} Course</h2>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Title</label>
        {{ form.title }}
    </div>

    <div class="mb-3">
        <label class="form-label">Description</label>
        {{ form.description }}
    </div>

    <div class="mb-3">
        <label class="form-label">Price</label>
        {{ form.price }}
    </div>

    <button type="submit" class="btn btn-primary">Save</button>

</form>

{% endblock %}
